<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LINSY BPS Mall · Product List (Web)</title>
  <style>:root {
  --primary: #4ed9cc;
  --primary-dark: #3bc4b8;
  --primary-soft: rgba(78, 217, 204, 0.14);
  --text: #2b3136;
  --muted: #8a959c;
  --line: #e8edef;
  --bg: #f5f7f8;
  --danger: #e05c6a;
  --footer-bg: #2d3439;
  --footer-text: #b8c0c5;
  --shadow: 0 8px 24px rgba(20, 45, 58, 0.08);
  --container: 1280px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font: 14px/1.5 "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

button, input { font: inherit; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }

.container {
  max-width: var(--container);
  margin: 0 auto;
  padding: 0 24px;
}

/* Top bar */
.topbar {
  background: var(--primary);
  color: #fff;
  font-size: 12px;
}

.topbar-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 36px;
  gap: 16px;
}

.topbar-left { flex-shrink: 0; }

.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-left: auto;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.user-greet { font-weight: 500; }
.icon-exit { opacity: 0.85; margin-left: 4px; cursor: pointer; }
.service-info { opacity: 0.95; white-space: nowrap; }

.topbar-right .tool {
  border: none;
  background: transparent;
  color: #fff;
  cursor: pointer;
  padding: 4px 2px;
  font-size: 12px;
}

.sep { opacity: 0.6; }
.guide { cursor: pointer; }

/* Header */
.header {
  background: #fff;
  border-bottom: 1px solid var(--line);
  position: relative;
  z-index: 100;
}

.header.menu-open { border-bottom-color: transparent; }

.header-inner {
  display: flex;
  align-items: center;
  gap: 20px;
  min-height: 64px;
}

.brand {
  display: flex;
  align-items: baseline;
  gap: 6px;
  flex-shrink: 0;
}

.brand-en {
  font-size: 26px;
  font-weight: 800;
  color: var(--primary-dark);
  letter-spacing: 0.02em;
}

.brand-cn {
  font-size: 14px;
  color: var(--muted);
  font-weight: 500;
}

.main-nav {
  display: flex;
  align-items: center;
  gap: 24px;
  flex-shrink: 0;
}

.nav-link {
  position: relative;
  padding: 8px 0;
  color: #4a5560;
  font-size: 15px;
  border: none;
  background: transparent;
  cursor: pointer;
}

.nav-link.active {
  color: var(--text);
  font-weight: 600;
}

.nav-link.active::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: -20px;
  height: 3px;
  background: var(--primary);
  border-radius: 2px;
}

.nav-link.open::after { display: block; }
.nav-link .arrow { font-size: 10px; margin-left: 2px; }

.search-box {
  display: flex;
  align-items: center;
  border: 1px solid var(--line);
  border-radius: 999px;
  overflow: hidden;
  width: 240px;
  flex-shrink: 0;
  margin-left: auto;
}

.search-box input {
  flex: 1;
  border: none;
  padding: 8px 14px;
  outline: none;
  min-width: 0;
}

.search-btn {
  border: none;
  background: transparent;
  padding: 8px 12px;
  cursor: pointer;
  color: var(--muted);
}

/* Mega menu */
.mega-menu {
  border-top: 1px solid var(--line);
  background: #fff;
  box-shadow: 0 12px 32px rgba(20, 45, 58, 0.08);
}

.mega-inner {
  display: grid;
  grid-template-columns: 1fr 220px;
  gap: 0;
  padding: 28px 24px 32px;
}

.mega-columns {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 20px 16px;
}

.mega-col-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 12px;
}

.mega-col-title.underline {
  text-decoration: underline;
  text-underline-offset: 4px;
}

.mega-group { margin-bottom: 12px; }

.mega-group-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}

.mega-group-title.muted,
.mega-link.muted {
  color: var(--muted);
  font-weight: 400;
}

.mega-link {
  display: block;
  font-size: 13px;
  color: var(--text);
  line-height: 1.65;
  cursor: pointer;
}

.mega-link:hover { color: var(--primary-dark); }

.mega-featured {
  border-left: 1px solid var(--line);
  padding-left: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.mega-featured-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  transition: border-color 0.15s;
}

.mega-featured-item:hover { border-color: var(--primary); }

.mega-featured-item img {
  width: 40px;
  height: 40px;
  border-radius: 6px;
  object-fit: cover;
  flex-shrink: 0;
}

/* Category bar */
.category-bar {
  background: #fff;
  border-bottom: 1px solid var(--line);
  padding: 12px 0;
}

.category-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}

.cat-fixed {
  flex-shrink: 0;
  z-index: 2;
  background: #fff;
  box-shadow: 8px 0 12px -8px rgba(0, 0, 0, 0.08);
}

.category-scroll {
  display: flex;
  align-items: center;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  flex: 1;
  min-width: 0;
}

.category-scroll::-webkit-scrollbar { display: none; }

.cat-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  border: none;
  background: transparent;
  cursor: pointer;
  padding: 8px 14px;
  border-radius: 8px;
  min-width: 88px;
  flex-shrink: 0;
  font-size: 12px;
  color: var(--muted);
  transition: background 0.15s, color 0.15s;
}

.cat-item.active {
  background: var(--primary);
  color: #fff;
}

.cat-img {
  width: 48px;
  height: 48px;
  border-radius: 8px;
  object-fit: cover;
}

.cat-arrow {
  border: 1px solid var(--line);
  background: #fff;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  color: var(--muted);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.cat-arrow.hidden { visibility: hidden; pointer-events: none; }

/* Products layout */
.page-products { padding: 24px 0 48px; }

.product-grid {
  display: grid;
  gap: 20px;
}

.product-grid.cols-5 { grid-template-columns: repeat(5, 1fr); }

.product-card {
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}

.product-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(20, 45, 58, 0.12);
}

.card-img {
  position: relative;
  aspect-ratio: 1;
  background: #eef1f3;
}

.product-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.thumb-dots {
  position: absolute;
  bottom: 8px;
  left: 8px;
  right: 8px;
  display: flex;
  gap: 4px;
  align-items: center;
}

.dot-img {
  width: 28px;
  height: 28px;
  border-radius: 4px;
  object-fit: cover;
  border: 1px solid #fff;
  flex-shrink: 0;
}

.more {
  font-size: 11px;
  background: rgba(0, 0, 0, 0.55);
  color: #fff;
  padding: 3px 6px;
  border-radius: 4px;
  margin-left: auto;
  flex-shrink: 0;
}

.card-body { padding: 12px 12px 14px; }

.card-title-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 8px;
}

.card-title {
  font-size: 13px;
  font-weight: 500;
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  flex: 1;
}

.fav-btn {
  border: none;
  background: transparent;
  font-size: 18px;
  cursor: pointer;
  color: var(--muted);
  flex-shrink: 0;
  line-height: 1;
}

.fav-btn.on { color: var(--danger); }

.card-price {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 6px;
}

.card-meta {
  font-size: 11px;
  color: var(--muted);
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: 32px;
}

.page-btn {
  min-width: 36px;
  height: 36px;
  border: 1px solid var(--line);
  background: #fff;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text);
  font-size: 14px;
}

.page-btn.active {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
}

.page-ellipsis { padding: 0 8px; color: var(--muted); }

.footer {
  background: var(--footer-bg);
  color: var(--footer-text);
  margin-top: auto;
}

.footer-grid {
  display: grid;
  grid-template-columns: 1.2fr repeat(4, 1fr);
  gap: 32px;
  padding: 48px 24px 32px;
}

.footer-logo .brand-en { color: var(--primary); }
.footer-logo .brand-cn { color: var(--footer-text); }
.footer-contact { font-weight: 600; color: #fff; margin: 16px 0 8px; }
.globe { font-size: 20px; margin-top: 12px; }

.footer-col h4 {
  color: #fff;
  font-size: 14px;
  margin-bottom: 14px;
}

.footer-col a {
  display: block;
  font-size: 13px;
  margin-bottom: 8px;
  cursor: pointer;
}

.footer-bottom {
  border-top: 1px solid rgba(255, 255, 255, 0.08);
  padding: 16px 24px;
  text-align: center;
  font-size: 12px;
  opacity: 0.75;
}

.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(43, 49, 54, 0.92);
  color: #fff;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

@media (max-width: 1200px) {
  .product-grid.cols-5 { grid-template-columns: repeat(4, 1fr); }
  .mega-columns { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 900px) {
  .product-grid.cols-5 { grid-template-columns: repeat(2, 1fr); }
  .footer-grid { grid-template-columns: 1fr 1fr; }
  .mega-inner { grid-template-columns: 1fr; }
  .mega-featured {
    border-left: none;
    border-top: 1px solid var(--line);
    padding-left: 0;
    padding-top: 16px;
    flex-direction: row;
    flex-wrap: wrap;
  }
}
</style>
</head>

  <div id="app">

  <script>window.BPS_LIST_DATA = (function () {
  const IMGS = [

    { id: 'study', name: 'Study', img: IMGS[9] },
  ];

  const MEGA_MENU = [
    {
      title: 'Living Room',
      groups: [
        { links: ['Side Table', 'Recliner Sofa', 'Storage Cabinet', 'Entryway Cabinet', 'Shoe Cabinet', 'Other Storage Cabinet'] },
        {
          title: 'Fabric Sofa',

          muted: true,
        },
      ],
    },
    {
      title: 'Living Room',
      groups: [
        { links: ['Coffee Table', 'Bean Bag Sofa'] },
        {
          title: 'Solid Wood Sofa',
          links: ['Single Sofa', 'Double Sofa', '3/4-Seater Sofa', 'Sofa Set'],
          muted: true,
        },
        { links: ['Sofa Accessories'] },
      ],
    },
    {
      title: 'Living Room',
      groups: [
        { links: ['TV Stand', 'Sofa Bed'] },
        {
          title: 'Leather Sofa',
          links: ['Single Sofa', 'Double Sofa', '3/4-Seater Sofa', 'Sofa Set'],
          muted: true,
        },
      ],
    },
    {
      title: 'Dining Room',
      underline: true,
      groups: [{ links: ['Dining Tables', 'Dining Cabinets', 'Dining Table Sets', 'Dining Chairs'] }],
    },
    {
      title: 'Bedroom',
      groups: [
        { links: ['Dresser Stools', 'Night Stands', 'Chests of Drawers', 'Wardrobes', 'Dresser Sets', 'Dressers'] },
        {
          title: 'Beds',
          links: ['Solid Wood Beds', 'Wood-panel Beds', 'Metal Beds', 'Bed Accessories', 'smart bed'],
          muted: true,
        },
      ],
    },
    {
      title: 'Study',
      groups: [{ links: ['Office Sets', 'Bookcases', 'Desks', 'Office Chairs'] }],
    },
  ];

  const MEGA_FEATURED = [
    { name: 'New Arrivals', img: IMGS[1] },
    { name: 'Bestsellers', img: IMGS[2] },
    { name: 'Linsy Living', img: IMGS[3] },
    { name: 'Kids Furniture', img: IMGS[5] },
    { name: 'Inspire Series', img: IMGS[4] },
  ];

  const PRODUCTS = Array.from({ length: 20 }, (_, i) => {
    const imgIdx = i % IMGS.length;
    return {
      id: `p${i + 1}`,
      title: 'Oxygen Wood Grain Sintered s...',

      moq: 5,
      images: 12,
      image: IMGS[imgIdx],
      gallery: [
        IMGS[imgIdx],
        IMGS[(imgIdx + 1) % IMGS.length],
        IMGS[(imgIdx + 2) % IMGS.length],

        IMGS[(imgIdx + 4) % IMGS.length],

(function () {
  const { CATEGORIES, PRODUCTS, MEGA_MENU, MEGA_FEATURED } = window.BPS_LIST_DATA;

  const ALL_CAT = CATEGORIES.find((c) => c.id === 'all');
  const SCROLL_CATS = CATEGORIES.filter((c) => c.id !== 'all');

  const state = {
    category: 'all',
    page: 2,
    favorites: new Set(PRODUCTS.filter((p) => p.favorited).map((p) => p.id)),
    productsOpen: false,
    catShowLeft: false,
  };

  const $ = (sel, root = document) => root.querySelector(sel);
  const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

  function showToast(msg) {
    let el = $('#toast');
    if (!el) {
      el = document.createElement('div');
      el.id = 'toast';
      el.className = 'toast';
      document.body.appendChild(el);
    }
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
  }

  function renderTopbar() {
    return `
      <div class="topbar">
        <div class="container topbar-inner">
          <div class="topbar-left">
            <span class="user-greet">Hi, Linsytest <span class="icon-exit" title="Logout">↗</span></span>
          </div>
          <div class="topbar-right">
            <span class="service-info">Service call: 0757-81299039 &nbsp;|&nbsp; Service email: franchise@linsy.com</span>
            <span class="sep">|</span>
            <button class="tool" type="button">English ▾</button>
            <span class="sep">|</span>
            <button class="tool" type="button">USD ▾</button>
            <span class="sep">|</span>
            <span class="guide">Guide</span>
          </div>
        </div>
      </div>
    `;
  }

  function renderMegaMenu() {
    if (!state.productsOpen) return '';
    return `
      <div class="mega-menu" id="megaMenu">
        <div class="container mega-inner">
          <div class="mega-columns">
            ${MEGA_MENU.map((col) => `
              <div class="mega-col">
                <div class="mega-col-title ${col.underline ? 'underline' : ''}">${col.title}</div>
                ${col.groups.map((g) => `
                  <div class="mega-group">
                    ${g.title ? `<div class="mega-group-title ${g.muted ? 'muted' : ''}">${g.title}</div>` : ''}
                    ${g.links.map((link) => `<a class="mega-link ${g.muted ? 'muted' : ''}" href="#">${link}</a>`).join('')}
                  </div>
                `).join('')}
              </div>
            `).join('')}
          </div>
          <aside class="mega-featured">
            ${MEGA_FEATURED.map((f) => `
              <a class="mega-featured-item" href="#">
                <img src="${f.img}" alt="${f.name}" />
                <span>${f.name}</span>
              </a>
            `).join('')}
          </aside>
        </div>
      </div>
    `;
  }

  function renderHeader() {
    return `
      <header class="header ${state.productsOpen ? 'menu-open' : ''}">
        <div class="container header-inner">
          <div class="brand">
            <span class="brand-en">LINSY</span><span class="brand-cn">林氏</span>
          </div>
          <nav class="main-nav">
            <a class="nav-link" href="#">Home</a>
            <button type="button" class="nav-link nav-products ${state.productsOpen ? 'active open' : 'active'}" data-action="toggle-products">
              Products <span class="arrow">▼</span>
            </button>
            <a class="nav-link" href="#">Wishlist</a>
            <a class="nav-link" href="#">PO</a>
            <a class="nav-link" href="#">Account</a>
          </nav>
          <div class="search-box">
            <input type="text" placeholder="search" />
            <button type="button" class="search-btn" aria-label="Search">🔍</button>
          </div>
        </div>
        ${renderMegaMenu()}
      </header>
    `;
  }

  function renderCategoryBar() {
    return `
      <div class="category-bar">
        <div class="container category-wrap">
          <button type="button" class="cat-item cat-fixed ${state.category === 'all' ? 'active' : ''}" data-cat="all">
            <img class="cat-img" src="${ALL_CAT.img}" alt="${ALL_CAT.name}" />
            <span>${ALL_CAT.name}</span>
          </button>
          <button type="button" class="cat-arrow cat-arrow-left ${state.catShowLeft ? '' : 'hidden'}" data-cat-scroll="left" aria-label="Scroll categories left">‹</button>
          <div class="category-scroll" id="catScroll">
            ${SCROLL_CATS.map((c) => `
              <button type="button" class="cat-item ${state.category === c.id ? 'active' : ''}" data-cat="${c.id}">
                <img class="cat-img" src="${c.img}" alt="${c.name}" />
                <span>${c.name}</span>
              </button>
            `).join('')}
          </div>
          <button type="button" class="cat-arrow cat-arrow-right" data-cat-scroll="right" aria-label="Scroll categories right">›</button>
        </div>
      </div>
    `;
  }

  function renderProductCard(p) {
    const fav = state.favorites.has(p.id);
    const thumbs = p.gallery.slice(0, 4);
    return `
      <article class="product-card" data-id="${p.id}">
        <div class="card-img">
          <img class="product-img" src="${p.image}" alt="${p.title}" loading="lazy" />
          <div class="thumb-dots">
            ${thumbs.map((t) => `<img class="dot-img" src="${t}" alt="" />`).join('')}
            <span class="more">+${p.images}</span>
          </div>
        </div>
        <div class="card-body">
          <div class="card-title-row">
            <h3 class="card-title">${p.title}</h3>
            <button type="button" class="fav-btn ${fav ? 'on' : ''}" data-fav="${p.id}" aria-label="Wishlist">♡</button>
          </div>
          <div class="card-price">$ ${p.price.toFixed(2)} USD</div>
          <div class="card-meta">
            <span>Est. Del: ${p.estDel}</span>
            <span>MOQ: ${p.moq} pcs</span>
            <span>Item: ${p.item}</span>
          </div>
        </div>
      </article>
    `;
  }

  function renderPagination() {
    const pages = [1, 2, 3, '...', 17];
    return `
      <div class="pagination">
        <button type="button" class="page-btn" data-page="prev">‹</button>
        ${pages.map((p) => typeof p === 'number'
    ? `<button type="button" class="page-btn ${state.page === p ? 'active' : ''}" data-page="${p}">${p}</button>`
    : `<span class="page-ellipsis">${p}</span>`).join('')}
        <button type="button" class="page-btn" data-page="next">›</button>
      </div>
    `;
  }

  function renderFooter() {
    return `
      <footer class="footer">
        <div class="container footer-grid">
          <div class="footer-brand">
            <div class="brand footer-logo"><span class="brand-en">LINSY</span><span class="brand-cn">林氏</span></div>
            <div class="footer-contact">Contact Us</div>
            <div>0757-81299039</div>
            <div class="globe">🌐</div>
          </div>
          <div class="footer-col">
            <h4>About LINSY</h4>
            <a>Brand Story</a><a>Why Choose Us</a><a>Company News</a><a>Contact Us</a>
          </div>
          <div class="footer-col">
            <h4>Investment Cooperation</h4>
            <a>Apply to Be a Distributor</a><a>Global Outlets</a><a>Our Strengths</a>
          </div>
          <div class="footer-col">
            <h4>Service Support</h4>
            <a>Warranty Service</a><a>Packaging Service</a><a>Delivery Service</a><a>VR Showroom</a><a>FAQS</a>
          </div>
          <div class="footer-col">
            <h4>Legal</h4>
            <a>Terms &amp; Conditions</a><a>Offers &amp; Details</a><a>Terms of Use</a><a>Privacy Policy</a>
            <a>SMS Program Terms</a><a>Dispute Resolution Process</a><a>Product Recalls</a>
            <a>Interest Based Ads</a><a>Do not sell or share my personal information</a>
          </div>
        </div>
        <div class="footer-bottom">FOSHAN LINSY HOME CO.,LTD 粤ICP备2021048987号-23 linsydirect.com</div>
      </footer>
    `;
  }

  function renderMain() {
    return `
      ${renderCategoryBar()}
      <div class="container page-products">
        <section class="product-area">
          <div class="product-grid cols-5">
            ${PRODUCTS.map(renderProductCard).join('')}
          </div>
          ${renderPagination()}
        </section>
      </div>
    `;
  }

  function render() {
    $('#app').innerHTML = `
      ${renderTopbar()}
      ${renderHeader()}
      <main>${renderMain()}</main>
      ${renderFooter()}
    `;
    bindEvents();
    updateCatArrows();
  }

  function updateCatArrows() {
    const scroller = $('#catScroll');
    if (!scroller) return;
    const first = scroller.firstElementChild;
    const leftBtn = $('.cat-arrow-left');
    if (!first || !leftBtn) return;

    const scrollerRect = scroller.getBoundingClientRect();
    const firstRect = first.getBoundingClientRect();
    const hidden = firstRect.left < scrollerRect.left - 2;
    state.catShowLeft = hidden || scroller.scrollLeft > 4;
    leftBtn.classList.toggle('hidden', !state.catShowLeft);
  }

  function bindEvents() {
    $$('[data-action="toggle-products"]').forEach((btn) => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        state.productsOpen = !state.productsOpen;
        render();
      });
    });

    if (state.productsOpen) {
      setTimeout(() => {
        const closeMenu = (e) => {
          const header = $('.header');
          if (header && !header.contains(e.target)) {
            state.productsOpen = false;
            document.removeEventListener('click', closeMenu);
            render();
          }
        };
        document.addEventListener('click', closeMenu);
      }, 0);
    }

    $$('[data-cat]').forEach((btn) => {
      btn.addEventListener('click', () => {
        state.category = btn.dataset.cat;
        render();
      });
    });

    const scroller = $('#catScroll');
    if (scroller) {
      scroller.addEventListener('scroll', updateCatArrows);
    }

    $$('[data-cat-scroll]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const el = $('#catScroll');
        if (!el) return;
        const delta = btn.dataset.catScroll === 'left' ? -240 : 240;
        el.scrollBy({ left: delta, behavior: 'smooth' });
        setTimeout(updateCatArrows, 320);
      });
    });

    $$('[data-fav]').forEach((btn) => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.dataset.fav;
        if (state.favorites.has(id)) {
          state.favorites.delete(id);
          showToast('Removed from wishlist');
        } else {
          state.favorites.add(id);
          showToast('Added to wishlist');
        }
        btn.classList.toggle('on', state.favorites.has(id));
      });
    });

    $$('[data-page]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const val = btn.dataset.page;
        if (val === 'prev' && state.page > 1) state.page -= 1;
        else if (val === 'next' && state.page < 17) state.page += 1;
        else if (!Number.isNaN(Number(val))) state.page = Number(val);
        render();
      });
    });

    $$('.product-card').forEach((card) => {
      card.addEventListener('click', () => showToast('Navigate to product detail'));
    });

    $$('.mega-link, .mega-featured-item').forEach((link) => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        state.productsOpen = false;
        showToast(`Navigate to ${link.textContent.trim()}`);
        render();
      });
    });

    window.addEventListener('resize', updateCatArrows);
  }

  function boot() {
    try { render(); }
    catch (err) {
      const root = document.getElementById('app');
      if (root) root.innerHTML = `<pre style="padding:24px;color:#c0392b;">${err.message}</pre>`;
    }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
</script>
</body>
</html>
