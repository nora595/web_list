<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LINSY BPS Mall · Product List (Web)</title>
  <style>:root {
  --primary: #4ed9cc;
  --primary-dark: #3bc4b8;
  --primary-soft: rgba(78, 217, 204, 0.14);
  --text: #2b3136;
  --muted: #8a959c;
  --line: #e8edef;
  --bg: #f5f7f8;
  --danger: #e05c6a;
  --footer-bg: #2d3439;
  --footer-text: #b8c0c5;
  --shadow: 0 8px 24px rgba(20, 45, 58, 0.08);
  --container: 1280px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font: 14px/1.5 "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

button, input { font: inherit; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }

.container {
  max-width: var(--container);
  margin: 0 auto;
  padding: 0 24px;
}

/* Demo toolbar */
.demo-toolbar {
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 999;
  display: flex;
  gap: 8px;
  background: rgba(43, 49, 54, 0.92);
  padding: 8px 10px;
  border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
}

.demo-toolbar a,
.demo-toolbar button {
  border: none;
  background: rgba(255, 255, 255, 0.12);
  color: #fff;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
}

.demo-toolbar a.active,
.demo-toolbar button.active {
  background: var(--primary);
  color: #fff;
}

/* Top bar */
.topbar {
  background: var(--primary);
  color: #fff;
  font-size: 12px;
}

.topbar-inner {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  min-height: 36px;
  gap: 16px;
}

.topbar-left { justify-self: start; }
.topbar-center { justify-self: center; text-align: center; white-space: nowrap; }
.topbar-right { justify-self: end; }

.user-greet { font-weight: 500; }
.icon-exit { opacity: 0.85; margin-left: 4px; cursor: pointer; }
.service-info { opacity: 0.95; }

.topbar-tools {
  display: flex;
  align-items: center;
  gap: 10px;
}

.topbar-tools .tool {
  border: none;
  background: transparent;
  color: #fff;
  cursor: pointer;
  padding: 4px 6px;
  font-size: 12px;
}

.sep { opacity: 0.6; }
.guide { cursor: pointer; }

/* Header */
.header {
  background: #fff;
  border-bottom: 1px solid var(--line);
}

.header-inner {
  display: flex;
  align-items: center;
  gap: 32px;
  min-height: 64px;
}

.brand {
  display: flex;
  align-items: baseline;
  gap: 6px;
  flex-shrink: 0;
}

.brand-en {
  font-size: 26px;
  font-weight: 800;
  color: var(--primary-dark);
  letter-spacing: 0.02em;
}

.brand-cn {
  font-size: 14px;
  color: var(--muted);
  font-weight: 500;
}

.main-nav {
  display: flex;
  align-items: center;
  gap: 28px;
  flex: 1;
  justify-content: center;
}

.nav-link {
  position: relative;
  padding: 8px 0;
  color: #4a5560;
  font-size: 15px;
}

.nav-link.active {
  color: var(--text);
  font-weight: 600;
}

.nav-link.active::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: -20px;
  height: 3px;
  background: var(--primary);
  border-radius: 2px;
}

.nav-link .arrow { font-size: 10px; margin-left: 2px; }

.search-box {
  display: flex;
  align-items: center;
  border: 1px solid var(--line);
  border-radius: 999px;
  overflow: hidden;
  width: 220px;
  flex-shrink: 0;
}

.search-box input {
  flex: 1;
  border: none;
  padding: 8px 14px;
  outline: none;
  min-width: 0;
}

.search-btn {
  border: none;
  background: transparent;
  padding: 8px 12px;
  cursor: pointer;
  color: var(--muted);
}

/* Category bar */
.category-bar {
  background: #fff;
  border-bottom: 1px solid var(--line);
  padding: 12px 0;
}

.category-scroll {
  display: flex;
  align-items: center;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
}

.category-scroll::-webkit-scrollbar { display: none; }

.cat-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  border: none;
  background: transparent;
  cursor: pointer;
  padding: 8px 14px;
  border-radius: 8px;
  min-width: 88px;
  flex-shrink: 0;
  font-size: 12px;
  color: var(--muted);
  transition: background 0.15s, color 0.15s;
}

.cat-item.active {
  background: var(--primary);
  color: #fff;
}

.cat-img {
  width: 48px;
  height: 48px;
  border-radius: 8px;
  object-fit: cover;
}

.cat-arrow {
  border: none;
  background: #fff;
  border: 1px solid var(--line);
  width: 32px;
  height: 32px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  color: var(--muted);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Products layout */
.page-products {
  padding: 24px 0 48px;
}

.page-products.with-filter {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 24px;
}

.filter-panel {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  box-shadow: var(--shadow);
  height: fit-content;
}

.filter-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 600;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
}

.filter-reset {
  border: none;
  background: transparent;
  cursor: pointer;
  color: var(--muted);
  font-size: 16px;
}

.filter-block { margin-bottom: 18px; }
.filter-block h4 {
  font-size: 13px;
  margin-bottom: 10px;
  color: var(--text);
  font-weight: 600;
}

.chip-group { display: flex; flex-wrap: wrap; gap: 6px; }

.chip {
  border: 1px solid var(--line);
  background: #fff;
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  color: var(--muted);
}

.chip.active {
  border-color: var(--primary);
  background: var(--primary-soft);
  color: var(--primary-dark);
}

.range-wrap { margin-bottom: 10px; }

.range-bar {
  height: 4px;
  background: var(--line);
  border-radius: 2px;
  position: relative;
  margin: 16px 0 12px;
}

.range-fill {
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  width: 55%;
  background: var(--primary);
  border-radius: 2px;
}

.range-knob {
  position: absolute;
  top: 50%;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--primary);
  border: 2px solid #fff;
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
  transform: translate(-50%, -50%);
}

.range-knob.min { left: 0; }
.range-knob.max { left: 55%; }

.range-labels {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--muted);
}

.check {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  margin-bottom: 8px;
  cursor: pointer;
  color: #4a5560;
}

.check input { accent-color: var(--primary); }

.sort-bar {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
}

.sort-item {
  border: none;
  background: transparent;
  cursor: pointer;
  color: var(--muted);
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.sort-item.active {
  color: var(--text);
  font-weight: 600;
}

.sort-item .arrow-up {
  font-size: 11px;
  color: var(--primary-dark);
}

/* Product grid */
.product-grid {
  display: grid;
  gap: 20px;
}

.product-grid.cols-5 { grid-template-columns: repeat(5, 1fr); }
.product-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }

.product-card {
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}

.product-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(20, 45, 58, 0.12);
}

.card-img {
  position: relative;
  aspect-ratio: 1;
  background: #eef1f3;
}

.product-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.thumb-dots {
  position: absolute;
  bottom: 8px;
  left: 8px;
  right: 8px;
  display: flex;
  gap: 4px;
  align-items: center;
}

.dot-img {
  width: 28px;
  height: 28px;
  border-radius: 4px;
  object-fit: cover;
  border: 1px solid #fff;
  flex-shrink: 0;
}

.more {
  font-size: 11px;
  background: rgba(0, 0, 0, 0.55);
  color: #fff;
  padding: 3px 6px;
  border-radius: 4px;
  margin-left: auto;
  flex-shrink: 0;
}

.card-body { padding: 12px 12px 14px; }

.card-title-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 8px;
}

.card-title {
  font-size: 13px;
  font-weight: 500;
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  flex: 1;
}

.fav-btn {
  border: none;
  background: transparent;
  font-size: 18px;
  cursor: pointer;
  color: var(--muted);
  flex-shrink: 0;
  line-height: 1;
}

.fav-btn.on { color: var(--danger); }

.card-price {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 6px;
}

.card-meta {
  font-size: 11px;
  color: var(--muted);
  display: flex;
  flex-direction: column;
  gap: 2px;
}

/* Pagination */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: 32px;
}

.page-btn {
  min-width: 36px;
  height: 36px;
  border: 1px solid var(--line);
  background: #fff;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text);
  font-size: 14px;
}

.page-btn.active {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
}

.page-ellipsis {
  padding: 0 8px;
  color: var(--muted);
}

/* Footer */
.footer {
  background: var(--footer-bg);
  color: var(--footer-text);
  margin-top: auto;
}

.footer-grid {
  display: grid;
  grid-template-columns: 1.2fr repeat(4, 1fr);
  gap: 32px;
  padding: 48px 24px 32px;
}

.footer-logo .brand-en { color: var(--primary); }
.footer-logo .brand-cn { color: var(--footer-text); }
.footer-contact { font-weight: 600; color: #fff; margin: 16px 0 8px; }
.globe { font-size: 20px; margin-top: 12px; }

.footer-col h4 {
  color: #fff;
  font-size: 14px;
  margin-bottom: 14px;
}

.footer-col a {
  display: block;
  font-size: 13px;
  margin-bottom: 8px;
  cursor: pointer;
}

.footer-bottom {
  border-top: 1px solid rgba(255, 255, 255, 0.08);
  padding: 16px 24px;
  text-align: center;
  font-size: 12px;
  opacity: 0.75;
}

.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(43, 49, 54, 0.92);
  color: #fff;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

@media (max-width: 1200px) {
  .product-grid.cols-5 { grid-template-columns: repeat(4, 1fr); }
  .product-grid.cols-4 { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 900px) {
  .page-products.with-filter { grid-template-columns: 1fr; }
  .product-grid.cols-5,
  .product-grid.cols-4 { grid-template-columns: repeat(2, 1fr); }
  .footer-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
  <div id="app">
    <noscript>
      <p style="padding:24px;font-family:sans-serif;">Please enable JavaScript to view this demo.</p>
    </noscript>
  </div>
  <script>window.BPS_LIST_DATA = (function () {
  const IMGS = [
    'https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1617806117938-529d34949e8f?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1598300042247-d088f8ab3a91?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1567538096630-e0c55bd6374c?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1617103996701-966ffc08c9b0?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1540574163026-643ea20ade25?w=480&h=480&fit=crop',
  ];

  const CATEGORIES = [
    { id: 'all', name: 'All Categories', img: IMGS[0] },
    { id: 'new', name: 'New Arrivals', img: IMGS[1] },
    { id: 'best', name: 'Bestsellers', img: IMGS[2] },
    { id: 'living', name: 'Linsy Living', img: IMGS[3] },
    { id: 'kids', name: 'Kids Furniture', img: IMGS[5] },
    { id: 'inspire', name: 'Inspire Series', img: IMGS[4] },
    { id: 'livingroom', name: 'Living Room', img: IMGS[6] },
    { id: 'dining', name: 'Dining Room', img: IMGS[7] },
    { id: 'bedroom', name: 'Bedroom', img: IMGS[8] },
    { id: 'study', name: 'Study', img: IMGS[9] },
  ];

  const PRODUCTS = Array.from({ length: 20 }, (_, i) => {
    const imgIdx = i % IMGS.length;
    return {
      id: `p${i + 1}`,
      title: 'Oxygen Wood Grain Sintered s...',
      item: `LSC25ZH07589${i}`,
      price: 78.56,
      estDel: '7d',
      moq: 5,
      images: 12,
      image: IMGS[imgIdx],
      gallery: [
        IMGS[imgIdx],
        IMGS[(imgIdx + 1) % IMGS.length],
        IMGS[(imgIdx + 2) % IMGS.length],
        IMGS[(imgIdx + 3) % IMGS.length],
        IMGS[(imgIdx + 4) % IMGS.length],
      ],
      favorited: i % 7 === 0,
    };
  });

  return { CATEGORIES, PRODUCTS };
})();

(function () {
  const { CATEGORIES, PRODUCTS } = window.BPS_LIST_DATA;

  const state = {
    view: 'simple',
    category: 'all',
    page: 2,
    sort: 'sales',
    favorites: new Set(PRODUCTS.filter((p) => p.favorited).map((p) => p.id)),
    loggedIn: true,
  };

  const $ = (sel, root = document) => root.querySelector(sel);
  const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

  function parseView() {
    const hash = location.hash.replace(/^#\/?/, '');
    state.view = hash === 'filter' ? 'filter' : 'simple';
    state.loggedIn = state.view === 'simple';
  }

  function showToast(msg) {
    let el = $('#toast');
    if (!el) {
      el = document.createElement('div');
      el.id = 'toast';
      el.className = 'toast';
      document.body.appendChild(el);
    }
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
  }

  function renderToolbar() {
    return `
      <div class="demo-toolbar">
        <a href="#/simple" class="${state.view === 'simple' ? 'active' : ''}">Grid List</a>
        <a href="#/filter" class="${state.view === 'filter' ? 'active' : ''}">Filter List</a>
      </div>
    `;
  }

  function renderTopbar() {
    const greet = state.loggedIn
      ? 'Hi, Linsytest <span class="icon-exit" title="Logout">↗</span>'
      : 'Hi, Login/Register';
    return `
      <div class="topbar">
        <div class="container topbar-inner">
          <div class="topbar-left"><span class="user-greet">${greet}</span></div>
          <div class="topbar-center">
            <span class="service-info">Service call: 0757-81299039 &nbsp;|&nbsp; Service email: franchise@linsy.com</span>
          </div>
          <div class="topbar-right">
            <div class="topbar-tools">
              <button class="tool" type="button">English ▾</button>
              <span class="sep">|</span>
              <button class="tool" type="button">USD ▾</button>
              <span class="sep">|</span>
              <span class="guide">Guide</span>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderHeader() {
    const placeholder = state.view === 'filter' ? 'sofas' : 'Search';
    return `
      <header class="header">
        <div class="container header-inner">
          <div class="brand">
            <span class="brand-en">LINSY</span><span class="brand-cn">林氏</span>
          </div>
          <nav class="main-nav">
            <a class="nav-link" href="#">Home</a>
            <a class="nav-link active" href="#">Products <span class="arrow">▼</span></a>
            <a class="nav-link" href="#">Wishlist</a>
            <a class="nav-link" href="#">PO</a>
            <a class="nav-link" href="#">Account</a>
          </nav>
          <div class="search-box">
            <input type="text" placeholder="${placeholder}" />
            <button type="button" class="search-btn" aria-label="Search">🔍</button>
          </div>
        </div>
      </header>
    `;
  }

  function renderCategoryBar() {
    return `
      <div class="category-bar">
        <div class="container category-scroll">
          ${CATEGORIES.map((c) => `
            <button type="button" class="cat-item ${state.category === c.id ? 'active' : ''}" data-cat="${c.id}">
              <img class="cat-img" src="${c.img}" alt="${c.name}" />
              <span>${c.name}</span>
            </button>
          `).join('')}
          <button type="button" class="cat-arrow" aria-label="More categories">›</button>
        </div>
      </div>
    `;
  }

  function renderProductCard(p) {
    const fav = state.favorites.has(p.id);
    const thumbs = p.gallery.slice(0, 4);
    return `
      <article class="product-card" data-id="${p.id}">
        <div class="card-img">
          <img class="product-img" src="${p.image}" alt="${p.title}" loading="lazy" />
          <div class="thumb-dots">
            ${thumbs.map((t) => `<img class="dot-img" src="${t}" alt="" />`).join('')}
            <span class="more">+${p.images}</span>
          </div>
        </div>
        <div class="card-body">
          <div class="card-title-row">
            <h3 class="card-title">${p.title}</h3>
            <button type="button" class="fav-btn ${fav ? 'on' : ''}" data-fav="${p.id}" aria-label="Wishlist">♡</button>
          </div>
          <div class="card-price">$ ${p.price.toFixed(2)} USD</div>
          <div class="card-meta">
            <span>Est. Del: ${p.estDel}</span>
            <span>MOQ: ${p.moq} pcs</span>
            <span>Item: ${p.item}</span>
          </div>
        </div>
      </article>
    `;
  }

  function renderFilters() {
    return `
      <aside class="filter-panel">
        <div class="filter-head">
          <span>Filters</span>
          <button type="button" class="filter-reset" title="Reset filters">🗑</button>
        </div>
        <section class="filter-block">
          <h4>Label</h4>
          <div class="chip-group">
            <button type="button" class="chip active">New Arrivals</button>
            <button type="button" class="chip">Bestsellers</button>
          </div>
        </section>
        <section class="filter-block">
          <h4>Price</h4>
          <div class="range-wrap">
            <div class="range-bar">
              <div class="range-fill"></div>
              <span class="range-knob min"></span>
              <span class="range-knob max"></span>
            </div>
            <div class="range-labels"><span>$0</span><span>$5000</span></div>
          </div>
          <div class="chip-group">
            <button type="button" class="chip active">Any</button>
            <button type="button" class="chip">$0-$100</button>
            <button type="button" class="chip">$101-$500</button>
            <button type="button" class="chip">$501-$1000</button>
          </div>
        </section>
        <section class="filter-block">
          <h4>MOQ</h4>
          <div class="chip-group">
            <button type="button" class="chip active">Any</button>
            <button type="button" class="chip">1 Piece</button>
            <button type="button" class="chip">5 Pieces</button>
            <button type="button" class="chip">10 Pieces</button>
            <button type="button" class="chip">50 Pieces</button>
            <button type="button" class="chip">100 Pieces</button>
          </div>
        </section>
        <section class="filter-block">
          <h4>Delivery Time</h4>
          <div class="chip-group">
            <button type="button" class="chip active">Any</button>
            <button type="button" class="chip">7 days</button>
            <button type="button" class="chip">15 days</button>
            <button type="button" class="chip">30 days</button>
            <button type="button" class="chip">Over 30 days</button>
          </div>
        </section>
        <section class="filter-block">
          <h4>Product Material</h4>
          <label class="check"><input type="checkbox" checked /> Any Material</label>
          <label class="check"><input type="checkbox" /> Wood</label>
          <label class="check"><input type="checkbox" /> Metal</label>
          <label class="check"><input type="checkbox" /> Fabric</label>
          <label class="check"><input type="checkbox" /> Plastic</label>
          <label class="check"><input type="checkbox" /> Glass</label>
        </section>
        <section class="filter-block">
          <h4>Product Size</h4>
          <label class="check"><input type="checkbox" checked /> Any Size</label>
          <label class="check"><input type="checkbox" /> Small</label>
          <label class="check"><input type="checkbox" /> Medium</label>
          <label class="check"><input type="checkbox" /> Large</label>
          <label class="check"><input type="checkbox" /> Custom Size</label>
        </section>
      </aside>
    `;
  }

  function renderSortBar() {
    const sorts = [
      { id: 'date', label: 'Listing Date' },
      { id: 'price', label: 'Price' },
      { id: 'delivery', label: 'Delivery Time' },
      { id: 'sales', label: 'Sales' },
    ];
    return `
      <div class="sort-bar">
        ${sorts.map((s) => `
          <button type="button" class="sort-item ${state.sort === s.id ? 'active' : ''}" data-sort="${s.id}">
            ${s.label}${state.sort === s.id ? ' <span class="arrow-up">↑</span>' : ''}
          </button>
        `).join('')}
      </div>
    `;
  }

  function renderPagination() {
    const pages = [1, 2, 3, '...', 17];
    return `
      <div class="pagination">
        <button type="button" class="page-btn" data-page="prev">‹</button>
        ${pages.map((p) => typeof p === 'number'
    ? `<button type="button" class="page-btn ${state.page === p ? 'active' : ''}" data-page="${p}">${p}</button>`
    : `<span class="page-ellipsis">${p}</span>`).join('')}
        <button type="button" class="page-btn" data-page="next">›</button>
      </div>
    `;
  }

  function renderFooter() {
    return `
      <footer class="footer">
        <div class="container footer-grid">
          <div class="footer-brand">
            <div class="brand footer-logo"><span class="brand-en">LINSY</span><span class="brand-cn">林氏</span></div>
            <div class="footer-contact">Contact Us</div>
            <div>0757-81299039</div>
            <div class="globe">🌐</div>
          </div>
          <div class="footer-col">
            <h4>About LINSY</h4>
            <a>Brand Story</a><a>Why Choose Us</a><a>Company News</a><a>Contact Us</a>
          </div>
          <div class="footer-col">
            <h4>Investment Cooperation</h4>
            <a>Apply to Be a Distributor</a><a>Global Outlets</a><a>Our Strengths</a>
          </div>
          <div class="footer-col">
            <h4>Service Support</h4>
            <a>Warranty Service</a><a>Packaging Service</a><a>Delivery Service</a><a>VR Showroom</a><a>FAQS</a>
          </div>
          <div class="footer-col">
            <h4>Legal</h4>
            <a>Terms &amp; Conditions</a><a>Offers &amp; Details</a><a>Terms of Use</a><a>Privacy Policy</a>
            <a>SMS Program Terms</a><a>Dispute Resolution Process</a><a>Product Recalls</a>
            <a>Interest Based Ads</a><a>Do not sell or share my personal information</a>
          </div>
        </div>
        <div class="footer-bottom">FOSHAN LINSY HOME CO.,LTD 粤ICP备2021048987号-23 linsydirect.com</div>
      </footer>
    `;
  }

  function renderMain() {
    const isFilter = state.view === 'filter';
    const cols = isFilter ? 'cols-4' : 'cols-5';
    return `
      ${renderCategoryBar()}
      <div class="container page-products ${isFilter ? 'with-filter' : ''}">
        ${isFilter ? renderFilters() : ''}
        <section class="product-area">
          ${isFilter ? renderSortBar() : ''}
          <div class="product-grid ${cols}">
            ${PRODUCTS.map(renderProductCard).join('')}
          </div>
          ${renderPagination()}
        </section>
      </div>
    `;
  }

  function render() {
    parseView();
    $('#app').innerHTML = `
      ${renderToolbar()}
      ${renderTopbar()}
      ${renderHeader()}
      <main>${renderMain()}</main>
      ${renderFooter()}
    `;
    bindEvents();
  }

  function bindEvents() {
    $$('[data-cat]').forEach((btn) => {
      btn.addEventListener('click', () => {
        state.category = btn.dataset.cat;
        render();
      });
    });

    $$('[data-fav]').forEach((btn) => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.dataset.fav;
        if (state.favorites.has(id)) {
          state.favorites.delete(id);
          showToast('Removed from wishlist');
        } else {
          state.favorites.add(id);
          showToast('Added to wishlist');
        }
        btn.classList.toggle('on', state.favorites.has(id));
      });
    });

    $$('[data-sort]').forEach((btn) => {
      btn.addEventListener('click', () => {
        state.sort = btn.dataset.sort;
        render();
      });
    });

    $$('[data-page]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const val = btn.dataset.page;
        if (val === 'prev' && state.page > 1) state.page -= 1;
        else if (val === 'next' && state.page < 17) state.page += 1;
        else if (!Number.isNaN(Number(val))) state.page = Number(val);
        render();
      });
    });

    $$('.chip').forEach((chip) => {
      chip.addEventListener('click', () => {
        const group = chip.closest('.chip-group');
        if (!group) return;
        group.querySelectorAll('.chip').forEach((c) => c.classList.remove('active'));
        chip.classList.add('active');
      });
    });

    $$('.product-card').forEach((card) => {
      card.addEventListener('click', () => showToast('Navigate to product detail'));
    });
  }
  function boot() {
    const root = document.getElementById('app');
    if (!root) return;
    window.addEventListener('hashchange', render);
    try { render(); }
    catch (err) {
      root.innerHTML = '<pre style="padding:24px;color:#c0392b;white-space:pre-wrap;font:14px/1.5 sans-serif;">Demo failed to load:\n' + err.message + '</pre>';
      console.error(err);
    }
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
</script>
</body>
</html>
